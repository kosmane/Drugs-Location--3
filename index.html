<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f1923" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ארון תרופות -3" />
  <title>ארון תרופות בבית חולים חירום -3</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0b1219;
      --surface: #111c27;
      --surface2: #162030;
      --border: #1e3245;
      --accent: #00c9a7;
      --accent2: #0084ff;
      --text: #e8f0fe;
      --text-muted: #6b8aaa;
      --danger: #ff4d6d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* Splash screen */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 20px;
      transition: opacity 0.5s ease;
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-icon {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      animation: splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes splashPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .splash-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      line-height: 1.5;
      animation: fadeIn 0.5s ease 0.3s both;
    }

    .splash-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      animation: fadeIn 0.5s ease 0.5s both;
    }

    .splash-spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite, fadeIn 0.3s ease 0.6s both;
    }

    .header-inner {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-title img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .app-title h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .version-badge {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      margin-right: auto;
    }

    .pharmacy-bar {
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pharmacy-bar a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      background: rgba(0,201,167,0.1);
      border: 1px solid rgba(0,201,167,0.25);
      border-radius: 20px;
      padding: 3px 12px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s;
    }

    .pharmacy-bar a:hover {
      background: rgba(0,201,167,0.2);
    }

    /* Install button */
    .install-bar {
      background: rgba(0,132,255,0.08);
      border: 1px solid rgba(0,132,255,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
    }

    .install-bar span {
      font-size: 0.8rem;
      color: var(--text-muted);
      flex: 1;
    }

    .install-bar button {
      background: var(--accent2);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.2s;
    }

    .install-bar button:hover { opacity: 0.85; }

    .ios-tip {
      display: none;
      font-size: 0.75rem;
      color: var(--accent);
      text-align: center;
      padding: 6px 0 0;
      animation: fadeIn 0.3s ease;
    }

    .reload-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 5px 10px;
      font-family: 'Heebo', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .reload-btn:hover { border-color: var(--accent); color: var(--accent); }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      padding: 12px 16px 12px 44px;
      transition: border-color 0.2s, box-shadow 0.2s;
      direction: rtl;
    }

    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,201,167,0.12);
    }

    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:disabled { opacity: 0.5; cursor: not-allowed; }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      display: none;
    }
    .clear-btn.visible { display: block; }

    #status-bar {
      max-width: 700px;
      margin: 10px auto 0;
      padding: 0 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .status-dot.ok { background: var(--accent); }
    .status-dot.loading { background: #f0a500; animation: pulse 1s infinite; }
    .status-dot.error { background: var(--danger); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 20px 60px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .group-section {
      margin-bottom: 28px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .group-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent2);
      background: rgba(0,132,255,0.1);
      border: 1px solid rgba(0,132,255,0.2);
      border-radius: 6px;
      padding: 3px 10px;
    }

    .group-line { flex: 1; height: 1px; background: var(--border); }

    .group-count { font-size: 0.72rem; color: var(--text-muted); }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .result-card:hover {
      border-color: rgba(0,201,167,0.4);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .card-body { padding: 16px; }

    .card-field { margin-bottom: 10px; }
    .card-field:last-child { margin-bottom: 0; }

    .field-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .field-value { font-size: 0.95rem; color: var(--text); line-height: 1.4; }
    .field-value.main { font-size: 1.05rem; font-weight: 600; }
    .field-value .highlight {
      background: rgba(0,201,167,0.2);
      color: var(--accent);
      border-radius: 3px;
      padding: 0 2px;
    }

    .location-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,132,255,0.12);
      border: 1px solid rgba(0,132,255,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      color: var(--accent2);
      font-weight: 600;
    }

    .card-image {
      border-top: 1px solid var(--border);
      background: var(--surface2);
      padding: 12px 16px;
    }

    .location-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    .img-placeholder {
      width: 100%;
      height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      gap: 6px;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
    }
    .img-placeholder .icon { font-size: 1.5rem; opacity: 0.4; }

    .results-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .error-box {
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.25);
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      color: var(--danger);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div id="splash">
  <img class="splash-icon" src="icons/icon-192.png" alt="ארון תרופות" />
  <div class="splash-title">ארון תרופות<br>בבית חולים חירום -3</div>
  <div class="splash-sub">טוען נתונים...</div>
  <div class="splash-spinner"></div>
</div>

<header>
  <div class="header-inner">
    <div class="app-title">
      <img src="icons/icon-192.png" alt="icon" />
      <h1>ארון תרופות בבית חולים חירום -3</h1>
      <span class="version-badge" id="version-badge">טוען...</span>
      <button class="reload-btn" onclick="loadExcel()">↻ רענן</button>
    </div>
    <div class="pharmacy-bar">
      <span>לבירורים נוספים התקשרו לבית המרקחת</span>
      <a href="tel:089779853">📞 08-9779853</a>
    </div>
    <div class="install-bar" id="install-btn">
      <span>📲 התקן את האפליקציה על הטלפון</span>
      <button onclick="installApp()">⬇️ התקן</button>
    </div>
    <div class="ios-tip" id="ios-tip">
      ב-iPhone: לחץ על ⬆️ ואז "הוסף למסך הבית"
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="חפש לפי שם, חומר פעיל, שם מסחרי..." autocomplete="off" disabled />
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
    </div>
  </div>
</header>

<div id="status-bar">
  <div class="status-dot loading" id="status-dot"></div>
  <span id="status-text">טוען נתונים...</span>
</div>

<main id="main-content">
  <div class="loading-state">
    <div class="spinner"></div>
    <p>טוען את מאגר החומרים...</p>
  </div>
</main>

<script>
  // ─── הגדרות קשיחות ──────────────────────────────────────────────────────────
  const REPO_RAW = 'https://raw.githubusercontent.com/kosmane/Drugs-Location--3/main';
  const IMAGES_URL = REPO_RAW + '/images/';

  // ─── State ───────────────────────────────────────────────────────────────────
  let allData = [];

  // ─── Init ────────────────────────────────────────────────────────────────────
  async function init() {
    document.getElementById('search-input').addEventListener('input', onSearch);
    await loadExcel();
  }

  // ─── מציאת קובץ האקסל לפי שם תאריך ─────────────────────────────────────────
  // האפליקציה מחפשת קובץ .xlsx בריפו דרך GitHub API
  async function findExcelFile() {
    try {
      const apiUrl = 'https://api.github.com/repos/kosmane/Drugs-Location--3/contents/';
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error('GitHub API error');
      const files = await res.json();
      
      // מחפש קובץ xlsx
      const xlsxFile = files.find(f => f.name.match(/\.xlsx?$/i));
      if (xlsxFile) return { url: xlsxFile.download_url, name: xlsxFile.name };
      
      return null;
    } catch (e) {
      return null;
    }
  }

  // ─── Load Excel ───────────────────────────────────────────────────────────────
  async function loadExcel() {
    setStatus('loading', 'טוען נתונים...');
    document.getElementById('search-input').disabled = true;
    document.getElementById('main-content').innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <p>טוען את מאגר החומרים...</p>
      </div>`;
    try {
      // מציאת קובץ האקסל
      const found = await findExcelFile();
      if (!found) throw new Error('לא נמצא קובץ Excel בריפו');

      const res = await fetch(found.url + '?nocache=' + Date.now());
      if (!res.ok) throw new Error(`שגיאת רשת ${res.status}`);

      const buffer = await res.arrayBuffer();
      const wb = XLSX.read(buffer, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      allData = XLSX.utils.sheet_to_json(ws, { defval: '' });

      // שם הקובץ = תאריך עדכון
      const dateLabel = found.name.replace(/\.xlsx?$/i, '');
      document.getElementById('version-badge').textContent = 'מעודכן: ' + dateLabel;

      setStatus('ok', `${allData.length} פריטים נטענו`);
      document.getElementById('search-input').disabled = false;
      document.getElementById('search-input').focus();
      hideSplash();
      showEmptySearch();

    } catch (err) {
      setStatus('error', 'שגיאה: ' + err.message);
      hideSplash();
      document.getElementById('main-content').innerHTML = `
        <div class="error-box">
          ❌ לא ניתן לטעון את הנתונים.<br>
          <strong>שגיאה:</strong> ${escHtml(err.message)}<br><br>
          ודא שקובץ האקסל הועלה לריפו ולחץ <strong>↻ רענן</strong>.
        </div>`;
      document.getElementById('version-badge').textContent = 'שגיאה';
    }
  }

  // ─── Search ───────────────────────────────────────────────────────────────────
  function onSearch(e) {
    const q = e.target.value.trim();
    document.getElementById('clear-btn').classList.toggle('visible', q.length > 0);
    if (!q) { showEmptySearch(); return; }
    const results = search(q);
    renderResults(results, q);
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('clear-btn').classList.remove('visible');
    showEmptySearch();
  }

  function search(q) {
    const ql = q.toLowerCase();
    const COLS = ['תיאור חומר', 'חומר פעיל', 'שם מסחרי', 'Brand names', 'שם בעברית'];
    return allData.filter(row =>
      COLS.some(col => (row[col] || '').toString().toLowerCase().includes(ql))
    );
  }

  // ─── Render ───────────────────────────────────────────────────────────────────
  function hideSplash() {
    const splash = document.getElementById('splash');
    if (splash) {
      splash.classList.add('hide');
      setTimeout(() => splash.remove(), 500);
    }
  }

  function showEmptySearch() {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>הקלד בשורת החיפוש כדי למצוא חומר</p>
      </div>`;
  }

  function renderResults(results, query) {
    const main = document.getElementById('main-content');

    if (results.length === 0) {
      main.innerHTML = `
        <div class="empty-state">
          <div class="icon">😕</div>
          <p>לא נמצאו תוצאות עבור "<strong>${escHtml(query)}</strong>"</p>
        </div>`;
      return;
    }

    // קיבוץ לפי מיקום בארון
    const groups = {};
    results.forEach(row => {
      const loc = (row['מיקום בארון'] || '').toString().trim().replace(/\s+/g, '') || 'ללא מיקום';
      if (!groups[loc]) groups[loc] = [];
      groups[loc].push(row);
    });

    // מיון מספרי
    const sortedKeys = Object.keys(groups).sort((a, b) => {
      const na = parseInt(a), nb = parseInt(b);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      return a.localeCompare(b, 'he');
    });

    let html = `<div class="results-info">${results.length} תוצאות ב-${sortedKeys.length} מיקומים</div>`;

    sortedKeys.forEach(loc => {
      const items = groups[loc];
      html += `
        <div class="group-section">
          <div class="group-header">
            <span class="group-label">ארון ${escHtml(loc)}</span>
            <div class="group-line"></div>
            <span class="group-count">${items.length} פריט${items.length !== 1 ? 'ים' : ''}</span>
          </div>`;

      items.forEach(row => { html += renderCard(row, query); });
      html += `</div>`;
    });

    main.innerHTML = html;
  }

  function renderCard(row, query) {
    const locNum = (row['מיקום בארון'] || '').toString().trim().replace(/\s+/g, '');
    const imgUrl = locNum ? `${IMAGES_URL}${locNum}.jpg` : null;

    const imgHtml = imgUrl
      ? `<div class="card-image">
           <img class="location-img"
             src="${imgUrl}"
             alt="מיקום ארון ${escHtml(locNum)}"
             onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><span class=\\'icon\\'>🖼️</span><span>תמונה ${escHtml(locNum)}.jpg לא נמצאה</span></div>'" />
         </div>`
      : '';

    return `
      <div class="result-card">
        <div class="card-body">
          <div class="card-field">
            <div class="field-label">תיאור חומר</div>
            <div class="field-value main">${highlight(row['תיאור חומר'] || '', query)}</div>
          </div>
          <div class="card-field">
            <div class="field-label">חומר פעיל</div>
            <div class="field-value">${highlight(row['חומר פעיל'] || '', query)}</div>
          </div>
          <div class="card-field">
            <div class="field-label">תיאור קבוצת חומר</div>
            <div class="field-value">${escHtml((row['תיאור קבוצת חומר'] || '').toString())}</div>
          </div>
          <div class="card-field" style="margin-top:10px">
            <span class="location-pill">📦 מיקום ${escHtml(locNum)}</span>
          </div>
        </div>
        ${imgHtml}
      </div>`;
  }

  // ─── Helpers ──────────────────────────────────────────────────────────────────
  function highlight(text, query) {
    const safe = escHtml(text.toString());
    if (!query) return safe;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return safe.replace(re, '<span class="highlight">$1</span>');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(type, msg) {
    document.getElementById('status-dot').className = 'status-dot ' + type;
    document.getElementById('status-text').textContent = msg;
  }

  // ─── Service Worker ───────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ─── PWA Install ─────────────────────────────────────────────────────────────
  let deferredPrompt = null;
  const installBtn = document.getElementById('install-btn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex';
  });

  window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
    deferredPrompt = null;
  });

  async function installApp() {
    if (!deferredPrompt) {
      // iOS – show manual instructions
      document.getElementById('ios-tip').style.display = 'block';
      setTimeout(() => document.getElementById('ios-tip').style.display = 'none', 6000);
      return;
    }
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBtn.style.display = 'none';
    deferredPrompt = null;
  }

  init();
</script>
</body>
</html>
